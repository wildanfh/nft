<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <circle cx="100" cy="100" r="95" fill="#f0f0f0" />

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,4; 0,0" dur="2.5s" repeatCount="indefinite" />

    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 60 50; -10 60 50; 0 60 50; 0 60 50" keyTimes="0; 0.1; 0.2; 1" dur="3s" repeatCount="indefinite" />
      <polygon points="40,70 45,15 85,55" fill="#FFB02E" />
      <polygon points="48,60 53,28 75,52" fill="#FFA3A3" />
    </g>

    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 140 50; 10 140 50; 0 140 50; 0 140 50" keyTimes="0; 0.1; 0.2; 1" dur="3.5s" repeatCount="indefinite" />
      <polygon points="160,70 155,15 115,55" fill="#FFB02E" />
      <polygon points="152,60 147,28 125,52" fill="#FFA3A3" />
    </g>

    <circle cx="100" cy="100" r="65" fill="#FFC34D" />

    <ellipse cx="75" cy="90" rx="9" ry="12" fill="#333333">
      <animate attributeName="ry" values="12; 0; 12; 12" keyTimes="0; 0.05; 0.1; 1" dur="4s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="125" cy="90" rx="9" ry="12" fill="#333333">
      <animate attributeName="ry" values="12; 0; 12; 12" keyTimes="0; 0.05; 0.1; 1" dur="4s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="60" cy="115" rx="12" ry="7" fill="#FF9999" opacity="0.6" />
    <ellipse cx="140" cy="115" rx="12" ry="7" fill="#FF9999" opacity="0.6" />

    <polygon points="95,110 105,110 100,118" fill="#FF7B7B" />

    <path d="M 85 125 Q 100 140 100 118 Q 100 140 115 125" stroke="#333333" stroke-width="3" fill="transparent" stroke-linecap="round" />

    <g stroke="#333333" stroke-width="2" stroke-linecap="round">
      <line x1="25" y1="105" x2="60" y2="110" />
      <line x1="20" y1="120" x2="55" y2="120" />
      <line x1="25" y1="135" x2="60" y2="130" />
    </g>

    <g stroke="#333333" stroke-width="2" stroke-linecap="round">
      <line x1="175" y1="105" x2="140" y2="110" />
      <line x1="180" y1="120" x2="145" y2="120" />
      <line x1="175" y1="135" x2="140" y2="130" />
    </g>
  </g>
</svg>
